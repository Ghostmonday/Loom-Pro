<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Express a software vision, resolve uncertainty, and authorize architectural handoff.</title>
  <link rel="stylesheet" href="screen.css">
  <link rel="stylesheet" href="screen.custom.css">
</head>
<body>
  <main
    id="screen-root"
    data-screen="loom.vision_canvas"
    data-mission="loom-vision-canvas"
    class="workspace-shell"
  >
    <h1>Express a software vision, resolve uncertainty, and authorize architectural handoff.</h1>
    <button id="vision-start-btn" data-classification="action_control" data-action="intake.start_session" data-feedback-target="vision-feedback" aria-label="Start Intent Forge Session" aria-busy="false" type="button">Start Intent Forge Session</button>
    <button id="vision-submit-answer-btn" data-classification="action_control" data-action="question.submit_answer" data-feedback-target="vision-feedback" aria-label="Submit Current Answer" aria-busy="false" type="button">Submit Current Answer</button>
    <button id="vision-revise-answer-btn" data-classification="action_control" data-action="question.revise_answer" data-feedback-target="vision-feedback" aria-label="Revise Previous Answer" aria-busy="false" type="button">Revise Previous Answer</button>
    <button id="vision-confirm-handoff-btn" data-classification="action_control" data-action="handoff.confirm" data-feedback-target="vision-feedback" aria-label="Confirm Handoff Readiness" aria-busy="false" type="button">Confirm Handoff Readiness</button>
    <button id="vision-accept-handoff-btn" data-classification="action_control" data-action="handoff.accept" data-feedback-target="vision-feedback" aria-label="Accept Architectural Handoff" aria-busy="false" type="button">Accept Architectural Handoff</button>
    <div id="vision-prompt-display" data-classification="display" data-contract-path="loom.vision.prompt">Vision prompt fixture awaiting session start</div>
    <div id="vision-question-display" data-classification="display" data-contract-path="loom.vision.current_question">No current question</div>
    <div id="vision-understanding-display" data-classification="display" data-contract-path="loom.vision.understanding">Understanding evidence not yet established</div>
    <div id="vision-readiness-display" data-classification="display" data-contract-path="loom.vision.readiness">Readiness 0 percent</div>
    <div id="vision-handoff-display" data-classification="display" data-contract-path="loom.vision.handoff_state">Handoff locked</div>
    <output id="vision-feedback" data-classification="display" data-contract-path="loom.vision.feedback" aria-live="polite" aria-atomic="true">Vision Canvas initialized</output>
  </main>
  <script src="mock-driver.js"></script>
  <script src="shell.js"></script>
  <script src="screen.custom.js"></script>
</body>
</html>
